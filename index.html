<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eman Bakery — ZATCA Invoice Scanner</title>

<!-- ZXing — most powerful QR decoder -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@400;600&display=swap');

:root {
    --bg: #07090c;
    --s1: #0f1318;
    --s2: #161c24;
    --border: #1e2530;
    --green: #10b981;
    --gold: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f1f5f9;
    --muted: #64748b;
    --sans: 'Plus Jakarta Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --ar: 'Noto Naskh Arabic', serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 30px;
}

/* MPIN Overlay */
#mpin-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
}

.mpin-box {
    background: var(--s1);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.mpin-box h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: var(--green);
}

.mpin-box p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
}

.mpin-input-wrap {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 25px;
}

.mpin-dot {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: 0.2s;
}

.mpin-dot.filled {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 10px var(--green);
}

.mpin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.key {
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 15px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.1s;
}

.key:active {
    background: var(--border);
    transform: scale(0.95);
}

.key.del {
    color: var(--red);
}

/* Header */
.hdr {
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.hdr-logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.hdr-ico {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #10b981, #059669);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: #000;
    letter-spacing: -0.5px;
}

.hdr-title {
    font-size: 15px;
    font-weight: 800;
}

.hdr-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 1px;
}

.hdr-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .8px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(16, 185, 129, .1);
    border: 1px solid rgba(16, 185, 129, .3);
    color: var(--green);
}

/* Tabs */
.tabs {
    display: flex;
    gap: 3px;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3px;
    margin: 14px 14px 0;
    flex-wrap: wrap;
}

.tab {
    flex: 1;
    min-width: 55px;
    padding: 10px 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    border-radius: 9px;
    cursor: pointer;
    transition: .18s;
    white-space: nowrap;
}

.tab.on {
    background: var(--s2);
    color: var(--text);
    box-shadow: 0 1px 6px rgba(0, 0, 0, .5);
}

.panel {
    display: none;
    padding: 14px;
}

.panel.on {
    display: block;
}

/* Camera */
.cam-wrap {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 10px;
}

.cam-view {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 1;
    max-height: 370px;
    overflow: hidden;
}

#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* overlay corners */
.ov {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}

.frame {
    width: 210px;
    height: 210px;
    position: relative;
}

.c {
    position: absolute;
    width: 26px;
    height: 26px;
    border-color: var(--green);
    border-style: solid;
}

.c.tl {
    top: 0;
    left: 0;
    border-width: 3px 0 0 3px;
    border-radius: 4px 0 0 0;
}

.c.tr {
    top: 0;
    right: 0;
    border-width: 3px 3px 0 0;
    border-radius: 0 4px 0 0;
}

.c.bl {
    bottom: 0;
    left: 0;
    border-width: 0 0 3px 3px;
    border-radius: 0 0 0 4px;
}

.c.br {
    bottom: 0;
    right: 0;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 4px 0;
}

.laser {
    position: absolute;
    left: 4px;
    right: 4px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), #fff, var(--green), transparent);
    box-shadow: 0 0 8px var(--green);
    animation: laser 2s ease-in-out infinite;
    top: 0;
}

@keyframes laser {
    0% {
        top: 4px;
        opacity: 0
    }
    8% {
        opacity: 1
    }
    92% {
        opacity: 1
    }
    100% {
        top: calc(100% - 4px);
        opacity: 0
    }
}

/* status bar */
.cam-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 14px;
    background: linear-gradient(transparent, rgba(0, 0, 0, .85));
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,
    100% {
        opacity: 1
    }
    50% {
        opacity: .3
    }
}

/* idle */
.idle {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--s2);
    cursor: pointer;
}

.idle svg {
    opacity: .5;
}

.idle p {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
}

/* flash */
.flash {
    position: absolute;
    inset: 0;
    background: rgba(16, 185, 129, .25);
    pointer-events: none;
    z-index: 10;
    animation: fl .5s forwards;
}

@keyframes fl {
    0% {
        opacity: 1
    }
    100% {
        opacity: 0
    }
}

/* cam controls */
.cam-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 12px 14px;
}

/* Buttons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px 10px;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
}

.btn:disabled {
    opacity: .35;
    cursor: not-allowed;
}

.g {
    background: var(--green);
    color: #000;
}

.g:hover:not(:disabled) {
    background: #059669;
}

.r {
    background: rgba(239, 68, 68, .1);
    border: 1px solid rgba(239, 68, 68, .3);
    color: var(--red);
}

.r:hover:not(:disabled) {
    background: rgba(239, 68, 68, .2);
}

.gh {
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
}

.gh:hover:not(:disabled) {
    border-color: var(--green);
    color: var(--green);
}

.go {
    background: rgba(245, 158, 11, .1);
    border: 1px solid rgba(245, 158, 11, .3);
    color: var(--gold);
}

.go:hover:not(:disabled) {
    background: rgba(245, 158, 11, .2);
}

/* select */
select {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    margin-bottom: 8px;
}

select:focus {
    border-color: var(--green);
}

/* Upload */
.dropzone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--s2);
    transition: .2s;
    margin-bottom: 10px;
}

.dropzone:hover,
.dropzone.over {
    border-color: var(--green);
    background: rgba(16, 185, 129, .04);
}

.dropzone .ico {
    font-size: 38px;
    margin-bottom: 10px;
}

.dropzone h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
}

.dropzone p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
}

#fi {
    display: none;
}

/* Manual */
.mbox {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
}

.mbox label {
    display: block;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.mbox textarea {
    width: 100%;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px;
    min-height: 90px;
    resize: vertical;
    outline: none;
}

.mbox textarea:focus {
    border-color: var(--green);
}

/* Error */
.errbox {
    background: rgba(239, 68, 68, .07);
    border: 1px solid rgba(239, 68, 68, .25);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-bottom: 10px;
    display: none;
}

.errbox.on {
    display: block;
}

/* Result card */
.rcard {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 12px;
    animation: up .25s ease;
}

@keyframes up {
    from {
        opacity: 0;
        transform: translateY(10px)
    }
    to {
        opacity: 1;
        transform: translateY(0)
    }
}

.rhead {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
}

.rhead-l {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: .8px;
    text-transform: uppercase;
}

.bz {
    background: rgba(16, 185, 129, .12);
    border: 1px solid rgba(16, 185, 129, .25);
    color: var(--green);
}

.bu {
    background: rgba(59, 130, 246, .12);
    border: 1px solid rgba(59, 130, 246, .25);
    color: var(--blue);
}

.bo {
    background: rgba(100, 116, 139, .12);
    border: 1px solid rgba(100, 116, 139, .25);
    color: var(--muted);
}

.rname {
    font-size: 13px;
    font-weight: 700;
}

.ibtns {
    display: flex;
    gap: 5px;
}

.ib {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--s1);
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: .15s;
}

.ib:hover {
    border-color: var(--green);
    color: var(--green);
}

/* field rows */
.ftable {
    border-top: 1px solid var(--border);
}

.frow {
    display: grid;
    grid-template-columns: 148px 1fr;
    gap: 8px;
    padding: 9px 16px;
    border-bottom: 1px solid rgba(30, 37, 48, .6);
    align-items: start;
}

.frow:last-child {
    border-bottom: none;
}

.fl {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .7px;
    padding-top: 1px;
}

.fv {
    font-size: 13px;
    font-weight: 500;
    word-break: break-word;
    line-height: 1.5;
}

.fv.ar {
    font-family: var(--ar);
    font-size: 15px;
    direction: rtl;
    text-align: right;
}

.fv.mo {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
}

.fv.hl {
    color: var(--green);
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
}

.fv.amt {
    color: var(--gold);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
}

/* raw */
.rawrow {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
}

.rawtgl {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
}

.rawtgl:hover {
    color: var(--text);
}

.rawbox {
    margin-top: 8px;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.8;
    max-height: 150px;
    overflow-y: auto;
    display: none;
}

.rawbox.on {
    display: block;
}

/* ============ HISTORY / EXPORT TAB ============ */
.hist-topbar {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
}

.hist-info strong {
    color: var(--green);
    font-family: var(--mono);
    font-size: 14px;
}

.hist-info span {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
}

.hist-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

/* Filter section */
.filter-wrap {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
}

.filter-wrap h4 {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
}

.filter-grid input {
    width: 100%;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 9px 10px;
    outline: none;
    transition: .15s;
}

.filter-grid input:focus {
    border-color: var(--green);
}

.filter-grid input::placeholder {
    color: var(--muted);
    opacity: .7;
}

.filter-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

/* Table wrapper for horizontal scroll */
.tbl-scroll {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    -webkit-overflow-scrolling: touch;
}

.tbl-wrap {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.stbl {
    min-width: 780px;
    width: max-content;
}

.shdr {
    display: grid;
    grid-template-columns: 28px 1fr 100px 100px 90px 90px 100px 34px;
    padding: 10px 12px;
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    gap: 4px;
    white-space: nowrap;
}

.srow {
    display: grid;
    grid-template-columns: 28px 1fr 100px 100px 90px 90px 100px 34px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(30, 37, 48, .5);
    gap: 4px;
    align-items: center;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
}

.srow:last-child {
    border-bottom: none;
}

.srow:hover {
    background: rgba(16, 185, 129, .04);
}

.srow.dup-highlight {
    background: rgba(245, 158, 11, .08);
    animation: dupPulse 1.5s ease-out;
}

@keyframes dupPulse {
    0% {
        background: rgba(245, 158, 11, .25);
    }
    100% {
        background: rgba(245, 158, 11, .04);
    }
}

.sn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
}

.sdate {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sname {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sname.ar {
    font-family: var(--ar);
    font-size: 13px;
    direction: rtl;
}

.sinv {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--blue);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.svat {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.samt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
}

.samt-tax {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
}

.samt-ttl {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
}

.sdel {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: transparent;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: .15s;
    flex-shrink: 0;
}

.srow:hover .sdel {
    border-color: rgba(239, 68, 68, .3);
    color: var(--red);
}

.sdel:hover {
    background: rgba(239, 68, 68, .1) !important;
}

.empty {
    padding: 44px 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.9;
    min-width: 300px;
}

.filter-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(59, 130, 246, .15);

async function syncWithAirtable() {
    document.getElementById('sync-status').textContent = 'SYNCING...';

        const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_NAME}?sort%5B0%5D%5Bfield%5D=timestamp&sort%5B0%5D%5Bdirection%5D=desc`, {

        });
        
        if (!response.ok) throw new Error('Sync failed');
        
        const data = await response.json();
        const cloudScans = data.records.map(r => {
            const f = r.fields;
            return {
                id: parseInt(f.id),
                sellerName: f.sellerName,
                date: f.invoiceDate,

                phase: f.phase,
                fields: JSON.parse(f.allFieldsJSON || '{}'),
                airtableId: r.id
            };
        });

        // Merge logic
        const localMap = new Map(scans.map(s => [s.id, s]));
        cloudScans.forEach(s => localMap.set(s.id, s));
        
        scans = Array.from(localMap.values()).sort((a, b) => b.ts - a.ts);
        saveLocal();

}

// ============ ZATCA DECODER ============
function decodeZatca(raw) {
    try {
        let bin;
        if (raw.startsWith('AR')) { // Possible base64
             bin = atob(raw);
        } else {
             bin = atob(raw);
        }
        
        const fields = {};
        let i = 0;
        const b = new Uint8Array(bin.length);
        for (let j = 0; j < bin.length; j++) b[j] = bin.charCodeAt(j);

        while (i < b.length) {
            const type = b[i++];
            const len = b[i++];
            const val = new TextDecoder().decode(b.slice(i, i + len));
            i += len;
            if (type === 1) fields['Seller Name'] = val;
            if (type === 2) fields['VAT Registration Number'] = val;
            if (type === 3) fields['Timestamp'] = val;
            if (type === 4) fields['Invoice Total'] = val;
            if (type === 5) fields['VAT Amount'] = val;
        }

        if (Object.keys(fields).length > 0) {
            return {
                type: 'zatca',
                name: fields['Seller Name'] || 'ZATCA Invoice',
                fields,
                sellerName: fields['Seller Name'],
                vatNo: fields['VAT Registration Number'],
                date: fields['Timestamp'],
                total: fields['Invoice Total'],
                vatAmt: fields['VAT Amount'],
                amountBeforeTax: (parseFloat(fields['Invoice Total']) - parseFloat(fields['VAT Amount'])).toFixed(2),
                phase: 'Phase 1'
            };
        }
    } catch (e) {}
    return null;
}

// ============ CORE LOGIC ============
async function processQR(raw) {
    const existing = scans.find(s => s.raw === raw);
    if (existing) {
        toast('⚠️ Already in history');
        setTab('cam');
        renderCard('cam-res', existing);
        return;
    }

    let scan = decodeZatca(raw);
    if (!scan) {
        scan = {
            id: Date.now(),
            type: 'data',
            name: 'Scanned Data',
            raw: raw,
            ts: Date.now(),
            fields: { 'Content': raw }
        };
    } else {
        scan.id = Date.now();
        scan.ts = Date.now();
        scan.raw = raw;
    }

    scans.unshift(scan);
    saveLocal();
    saveToAirtable(scan);
    renderCard(activeTab === 'cam' ? 'cam-res' : 'man-res', scan);
    toast('✓ Saved to history');
}

function renderCard(targetId, scan) {
    const { fields, name, type, raw } = scan;
    const bc = type === 'zatca' ? 'bz' : 'bo';
    const bl = type === 'zatca' ? '✓ ZATCA' : '◈ Data';
    
    const rows = Object.entries(fields || {}).map(([k, v]) => `
        <div class="frow">
            <div class="fl">${esc(k)}</div>
            <div class="fv ${/[\u0600-\u06FF]/.test(v) ? 'ar' : ''}">${esc(v)}</div>

    document.getElementById(targetId).innerHTML = `
        <div class="rcard">
            <div class="rhead">

                    <span class="rname">${esc(name)}</span>

            </div>
            <div class="ftable">${rows}</div>
        </div>
    `;
}

// ============ CAMERA ============
async function listCams() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('cam-sel');
    sel.innerHTML = cams.map(c => `<option value="${c.deviceId}">${c.label || 'Camera ' + (sel.length + 1)}</option>`).join('');
}

async function startScan() {
    document.getElementById('cam-idle').style.display = 'none';
    if (activeStream) stopScan();
    
    const deviceId = document.getElementById('cam-sel').value;
    try {
        activeStream = await navigator.mediaDevices.getUserMedia({ 
            video: { deviceId: deviceId ? { exact: deviceId } : undefined, facingMode: 'environment' } 
        });
        const video = document.getElementById('video');
        video.srcObject = activeStream;
        video.play();
        
        reader = new ZXing.BrowserQRCodeReader();
        reader.decodeFromVideoElement(video, (result, err) => {
            if (result) {
                const flash = document.createElement('div');
                flash.className = 'flash';
                document.getElementById('cam-view').appendChild(flash);
                setTimeout(() => flash.remove(), 500);
                processQR(result.text);
            }
        });
    } catch (e) {
        toast('Camera Error: ' + e.message, true);
    }
}

function stopScan() {
    if (reader) reader.reset();
    if (activeStream) activeStream.getTracks().forEach(t => t.stop());
    activeStream = null;
    document.getElementById('cam-idle').style.display = 'flex';
}

// ============ HISTORY TABLE ============
function renderTable() {
    const body = document.getElementById('tbl-body');
    const filtered = getFilteredScans();
    
    document.getElementById('hist-count').textContent = filtered.length + ' invoice' + (filtered.length !== 1 ? 's' : '');

            <div class="sdate">${new Date(s.ts).toLocaleDateString()}</div>

        </div>
    `).join('');
}

function getFilteredScans() {
    if (!activeFilters.active) return scans;
    return scans.filter(s => {
        if (activeFilters.supplier && !(s.sellerName || '').toLowerCase().includes(activeFilters.supplier.toLowerCase())) return false;
        if (activeFilters.invoice && !(s.invoiceNumber || '').toLowerCase().includes(activeFilters.invoice.toLowerCase())) return false;
        return true;
    });

                method: 'DELETE',
                headers: { Authorization: `Bearer patyU7N7Y5rXvH5pY.700147677353119560417757303964995641775730396499564177573` }

// ============ EXPORTS ============
function doExcel() {

function doCSV() {
    const headers = ['Date', 'Supplier', 'Invoice #', 'VAT No', 'Excl', 'VAT', 'Total'];
    const rows = scans.map(s => [
        new Date(s.ts).toLocaleDateString(),
        s.sellerName,
        s.invoiceNumber,
        s.vatNo,
        s.amountBeforeTax,
        s.vatAmt,
        s.total
    ]);
    const content = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([content], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Invoices.csv';
    a.click();
}

function doMan() {
    const raw = document.getElementById('man-raw').value.trim();

}

async function doFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async (event) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                processQR(code.data);
            } else {
                toast('❌ No QR code found in image', true);
            }
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}
